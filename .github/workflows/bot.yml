name: AIPLYER DragonSlayer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]

concurrency:
  group: aiplyer-dragonslayer
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 358
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Restore memory cache
        uses: actions/cache@v4
        with:
          path: data/
          key: aiplyer-memory-${{ github.run_id }}
          restore-keys: |
            aiplyer-memory-

      - name: Run tests
        run: npm test

      - name: Run bot (5h56m cycle)
        env:
          MC_SERVER_HOST: AITEST12.aternos.me
          MC_SERVER_PORT: '15820'
          MC_USERNAME: AIPLYER
          MC_VERSION: '1.21.1'
          RUN_CYCLE_SECONDS: '21360'
          DNS_SERVERS: '1.1.1.1,1.0.0.1,8.8.8.8,8.8.4.4'
          SELF_DISPATCH_TOKEN: ${{ secrets.SELF_DISPATCH_TOKEN }}
        run: node src/index.js
        continue-on-error: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiplyer-logs-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload memory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiplyer-memory-${{ github.run_id }}
          path: data/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit memory back
        if: always()
        run: |
          git config user.name "AIPLYER-bot"
          git config user.email "bot@aiplyer.local"
          git add data/ || true
          git commit -m "chore(memory): update state [skip ci]" || echo "nothing to commit"
          git push || echo "push skipped"
        continue-on-error: true

      - name: Optional self-dispatch next run
        if: always()
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.SELF_DISPATCH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "SELF_DISPATCH_TOKEN not set; relying on schedule"
            exit 0
          fi
          curl -s -o /tmp/self_dispatch.txt -w "%{http_code}" -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/actions/workflows/bot.yml/dispatches" \
            -d '{"ref":"main"}'
